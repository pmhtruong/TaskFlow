
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="./img/logo.svg">

  <!-- Material Symbols icon font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <!-- Google Fonts: Inter for headings, Roboto for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


</head>
<body>
  <div class="app-wrapper">
    <div class="todo-box">
      <div class="todo-header">
        <span class="material-symbols-outlined">arrow_back_ios</span>
                  <h2 id="projectTitle" contenteditable="true" data-placeholder="Enter Title"></h2>
      </div>
      <div class="divider"></div>

      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task"></input>
      </div>

      <ul class="task-list" id="taskList">
        <!-- <li class="task-item"></li> -->

      </ul>
    </div>
   </div>
   <script src="script.js"></script>
</body>
</html>
